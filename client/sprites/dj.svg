<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- headphones band -->
  <rect x="9" y="5" width="14" height="1" fill="#e6a855"/>
  <rect x="8" y="6" width="1" height="3" fill="#e6a855"/>
  <rect x="23" y="6" width="1" height="3" fill="#e6a855"/>

  <!-- headphone cups -->
  <rect x="6" y="8" width="3" height="4" fill="#cc8833"/>
  <rect x="23" y="8" width="3" height="4" fill="#cc8833"/>

  <!-- head -->
  <rect x="11" y="6" width="10" height="2" fill="#d4a373"/>
  <rect x="9" y="8" width="14" height="2" fill="#b07d52"/>
  <rect x="8" y="10" width="16" height="10" fill="#b07d52"/>
  <rect x="9" y="20" width="14" height="6" fill="#5c3d26"/>

  <!-- face outline -->
  <rect x="8" y="8" width="16" height="1" fill="#2e1e12"/>
  <rect x="8" y="20" width="16" height="1" fill="#2e1e12"/>
  <rect x="8" y="9" width="1" height="11" fill="#2e1e12"/>
  <rect x="23" y="9" width="1" height="11" fill="#2e1e12"/>

  <!-- eyes -->
  <rect x="13" y="13" width="2" height="2" fill="#0c0806"/>
  <rect x="18" y="13" width="2" height="2" fill="#0c0806"/>
  <!-- nose -->
  <rect x="15" y="16" width="2" height="1" fill="#1e1408"/>

  <!-- mouth (slight grin) -->
  <rect x="13" y="17" width="6" height="2" fill="#f2d8b8"/>
  <rect x="14" y="18" width="4" height="1" fill="#2e1e12"/>

  <!-- vinyl record (held in front) -->
  <rect x="10" y="22" width="12" height="1" fill="#1a1a1a"/>
  <rect x="9" y="23" width="14" height="1" fill="#1a1a1a"/>
  <rect x="9" y="24" width="14" height="1" fill="#1a1a1a"/>
  <rect x="10" y="25" width="12" height="1" fill="#1a1a1a"/>
  <rect x="15" y="23" width="2" height="2" fill="#e6a855"/>

  <!-- feet -->
  <rect x="12" y="27" width="3" height="3" fill="#2e1e12"/>
  <rect x="17" y="27" width="3" height="3" fill="#2e1e12"/>
</svg>
